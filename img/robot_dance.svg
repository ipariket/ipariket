<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#FF0080"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- twinkling stars -->
  <circle cx="80" cy="30" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="30" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="15" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- glowing name text -->
  <text x="450" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="56" font-weight="700" fill="#00D4FF" filter="url(#glow)">
    PARIKET
    <animate attributeName="fill" values="#00D4FF;#FF0080;#00FF88;#FFD700;#00D4FF" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- ground line -->
  <line x1="0" y1="220" x2="900" y2="220" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>

  <!-- robot: centered, dancing side to side -->
  <g filter="url(#glow)" transform="translate(420,90)">

    <!-- side-step shuffle with slide + jump -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; -120,0; -120,-50; -120,0; 0,0; 120,0; 120,-50; 120,0; 0,0"
        keyTimes="0;0.15;0.2;0.25;0.5;0.65;0.7;0.75;1"
        dur="3.2s" repeatCount="indefinite"/>

      <!-- bounce on each step -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          additive="sum"
          values="0,0; 0,-18; 0,0; 0,-18; 0,0"
          keyTimes="0;0.25;0.5;0.75;1"
          dur="0.8s" repeatCount="indefinite"/>

        <!-- body tilt groove -->
        <g>
          <animateTransform attributeName="transform" type="rotate"
            additive="sum"
            values="0 35 100; -8 35 100; 0 35 100; 8 35 100; 0 35 100"
            keyTimes="0;0.25;0.5;0.75;1"
            dur="1.6s" repeatCount="indefinite"/>

          <!-- legs kicking alternately -->
          <rect x="18" y="130" width="10" height="30" rx="3" fill="#00D4FF" transform-origin="23 130">
            <animateTransform attributeName="transform" type="rotate"
              values="0; -25; 0; 15; 0" keyTimes="0;0.25;0.5;0.75;1"
              dur="0.8s" repeatCount="indefinite"/>
          </rect>
          <rect x="42" y="130" width="10" height="30" rx="3" fill="#00D4FF" transform-origin="47 130">
            <animateTransform attributeName="transform" type="rotate"
              values="0; 15; 0; -25; 0" keyTimes="0;0.25;0.5;0.75;1"
              dur="0.8s" repeatCount="indefinite"/>
          </rect>

          <!-- body -->
          <rect x="10" y="80" width="50" height="55" rx="10" fill="url(#neon)"/>

          <!-- arms swinging -->
          <rect x="-4" y="90" width="10" height="30" rx="4" fill="#FF0080" transform-origin="1 90">
            <animateTransform attributeName="transform" type="rotate"
              values="0; -40; 0; 40; 0" keyTimes="0;0.25;0.5;0.75;1"
              dur="0.8s" repeatCount="indefinite"/>
          </rect>
          <rect x="64" y="90" width="10" height="30" rx="4" fill="#FF0080" transform-origin="69 90">
            <animateTransform attributeName="transform" type="rotate"
              values="0; 40; 0; -40; 0" keyTimes="0;0.25;0.5;0.75;1"
              dur="0.8s" repeatCount="indefinite"/>
          </rect>

          <!-- head -->
          <rect x="15" y="45" width="40" height="35" rx="8" fill="#0d0d1a" stroke="url(#neon)" stroke-width="3"/>

          <!-- eyes -->
          <circle cx="27" cy="62" r="4" fill="#00FF88">
            <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="43" cy="62" r="4" fill="#00FF88">
            <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
          </circle>

          <!-- antenna -->
          <line x1="35" y1="45" x2="35" y2="30" stroke="#FFD700" stroke-width="3"/>
          <circle cx="35" cy="27" r="4" fill="#FFD700">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="0.8s" repeatCount="indefinite"/>
          </circle>
        </g>
      </g>
    </g>
  </g>
</svg>
